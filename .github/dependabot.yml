# Dependabot will run on day 17 of each month at 02:58 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '58 2 17 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'Sefina-DS'
    versioning-strategy: 'increase'
    cooldown:
      default: 7
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '58 2 17 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'Sefina-DS'
