<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Victron GX – Geräte</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
            background: #1e1e1e;
            color: #e0e0e0;
            padding: 16px;
            font-size: 14px;
        }
        h2 { font-size: 18px; font-weight: 500; margin-bottom: 4px; color: #fff; }
        .subtitle { color: #9e9e9e; font-size: 13px; margin-bottom: 16px; }
        .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .search {
            padding: 6px 12px; border: 1px solid #444;
            border-radius: 4px; background: #2a2a2a;
            color: #e0e0e0; font-size: 13px; width: 280px; outline: none;
        }
        .search:focus { border-color: #1976d2; }
        .btn {
            padding: 6px 16px; background: #1976d2; color: #fff;
            border: none; border-radius: 4px; font-size: 13px;
            font-weight: 500; cursor: pointer; text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn:hover { background: #1565c0; }
        .count { font-size: 12px; color: #9e9e9e; margin-left: auto; }
        .status { font-size: 13px; color: #4caf50; }
        .table-wrap { border: 1px solid #333; border-radius: 4px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            background: #1976d2; color: #fff; padding: 10px 14px;
            text-align: left; font-weight: 500; font-size: 12px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        td { padding: 7px 14px; border-bottom: 1px solid #333; color: #e0e0e0; }
        tr:last-child td { border-bottom: none; }
        tr:nth-child(even) td { background: #252525; }
        tr:hover td { background: #2d2d2d; }
        code {
            font-family: 'Roboto Mono', monospace; font-size: 12px;
            background: rgba(255,255,255,0.08); padding: 1px 4px; border-radius: 3px;
        }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; color: white; }
        .badge-real { background: #4caf50; }
        .badge-virtual { background: #00bcd4; }
        .badge-yes { background: #4caf50; }
        .null-val { color: #616161; font-style: italic; }
        .loading { padding: 24px; color: #9e9e9e; text-align: center; }
        .empty { padding: 24px; color: #f44336; text-align: center; }
    </style>
</head>
<body>
    <h2>⚡ Erkannte Geräte (Whitelist)</h2>
    <p class="subtitle">Alle Geräte und Datenpunkte die der Adapter aktuell verarbeitet</p>
    <div class="toolbar">
        <button class="btn" onclick="downloadMap()">⬇ Download</button>
        <input class="search" type="text" id="search" placeholder="Suchen..." oninput="filterTable()">
        <span class="status" id="status"></span>
        <span class="count" id="count"></span>
    </div>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Gerät</th><th>Typ</th><th>Seriennummer</th><th>Name</th><th>Art</th><th>Datenpunkte</th></tr></thead>
            <tbody id="tbody"><tr><td colspan="6" class="loading">⏳ Lade Daten...</td></tr></tbody>
        </table>
    </div>
    <script>
        var mapData = null;
        var TYPES = { battery:'Batterie', vebus:'Wechselrichter', grid:'Netz', pvinverter:'PV-Wechselrichter', acload:'AC-Last', switch:'Schalter', temperature:'Temperatursensor', meteo:'Wetterstation', tank:'Tank', system:'System' };
        function getInstance() { var m = location.search.match(/[?&]instance=([^&#]+)/); return 'victron-gx.' + (m ? decodeURIComponent(m[1]) : '0'); }
        function sendTo(cmd, data, cb) {
            var inst = getInstance();
            if (window.parent && window.parent.sendTo) { window.parent.sendTo(inst, cmd, data, cb); }
            else { var s = document.createElement('script'); s.src = location.origin + '/socket.io/socket.io.js'; s.onload = function() { var sock = io.connect(location.origin); sock.on('connect', function() { sock.emit('sendTo', inst, cmd, data, cb); }); }; s.onerror = function() { cb(null); }; document.head.appendChild(s); }
        }
        function renderTable(map) {
            var search = document.getElementById('search').value.toLowerCase();
            var rows = '', count = 0;
            for (var key in map) {
                var dev = map[key], type = key.split('/')[0];
                var name = dev.customName || dev.productName || '-';
                var badge = dev.virtual ? '<span class="badge badge-virtual">Virtuell</span>' : '<span class="badge badge-real">Real</span>';
                if (search && key.toLowerCase().indexOf(search) < 0 && name.toLowerCase().indexOf(search) < 0 && (dev.serial||'').toLowerCase().indexOf(search) < 0) continue;
                count++;
                rows += '<tr><td><code>' + key + '</code></td><td>' + (TYPES[type]||type) + '</td><td><code>' + (dev.serial||'-') + '</code></td><td>' + name + '</td><td>' + badge + '</td><td>' + Object.keys(dev.paths).length + '</td></tr>';
            }
            document.getElementById('tbody').innerHTML = rows || '<tr><td colspan="6" class="empty">Keine Einträge</td></tr>';
            document.getElementById('count').textContent = count + ' Geräte';
        }
        function filterTable() { if (mapData) renderTable(mapData); }
        function downloadMap() {
            if (!mapData) return;
            var a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(mapData, null, 2)], {type:'application/json'})); a.download = 'victron-gx-whitelist.json'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
            document.getElementById('status').textContent = '✅ Download gestartet';
        }
        window.addEventListener('load', function() {
            sendTo('downloadMap', {}, function(result) {
                if (result && result.result) { try { mapData = JSON.parse(result.result); renderTable(mapData); } catch(e) { document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty">❌ ' + e.message + '</td></tr>'; } }
                else { document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty">❌ Adapter nicht erreichbar</td></tr>'; }
            });
        });
    </script>
</body>
</html>
