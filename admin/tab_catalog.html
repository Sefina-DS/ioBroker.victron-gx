<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Victron GX – Topic Catalog</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
            background: #1e1e1e;
            color: #e0e0e0;
            padding: 16px;
            font-size: 14px;
        }
        h2 { font-size: 18px; font-weight: 500; margin-bottom: 4px; color: #fff; }
        .subtitle { color: #9e9e9e; font-size: 13px; margin-bottom: 16px; }
        .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .search {
            padding: 6px 12px; border: 1px solid #444;
            border-radius: 4px; background: #2a2a2a;
            color: #e0e0e0; font-size: 13px; width: 280px; outline: none;
        }
        .search:focus { border-color: #1976d2; }
        .btn {
            padding: 6px 16px; background: #1976d2; color: #fff;
            border: none; border-radius: 4px; font-size: 13px;
            font-weight: 500; cursor: pointer; text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn:hover { background: #1565c0; }
        .count { font-size: 12px; color: #9e9e9e; margin-left: auto; }
        .status { font-size: 13px; color: #4caf50; }
        .table-wrap { border: 1px solid #333; border-radius: 4px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            background: #1976d2; color: #fff; padding: 10px 14px;
            text-align: left; font-weight: 500; font-size: 12px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        td { padding: 7px 14px; border-bottom: 1px solid #333; color: #e0e0e0; }
        tr:last-child td { border-bottom: none; }
        tr:nth-child(even) td { background: #252525; }
        tr:hover td { background: #2d2d2d; }
        code {
            font-family: 'Roboto Mono', monospace; font-size: 12px;
            background: rgba(255,255,255,0.08); padding: 1px 4px; border-radius: 3px;
        }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; color: white; }
        .badge-real { background: #4caf50; }
        .badge-virtual { background: #00bcd4; }
        .badge-yes { background: #4caf50; }
        .null-val { color: #616161; font-style: italic; }
        .loading { padding: 24px; color: #9e9e9e; text-align: center; }
        .empty { padding: 24px; color: #f44336; text-align: center; }
    </style>
</head>
<body>
    <h2>📡 Topic Catalog</h2>
    <p class="subtitle">Alle MQTT-Topics die das GX-Gerät seit dem letzten Adapterstart gesendet hat</p>
    <div class="toolbar">
        <button class="btn" onclick="downloadCatalog()">⬇ Download</button>
        <input class="search" type="text" id="search" placeholder="Topic suchen..." oninput="filterTable()">
        <span class="status" id="status"></span>
        <span class="count" id="count"></span>
    </div>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Topic</th><th>Letzter Wert</th><th>In Whitelist</th></tr></thead>
            <tbody id="tbody"><tr><td colspan="3" class="loading">⏳ Lade Daten...</td></tr></tbody>
        </table>
    </div>
    <script>
        var catalogData = null, whitelistTopics = new Set();
        function getInstance() { var m = location.search.match(/[?&]instance=([^&#]+)/); return 'victron-gx.' + (m ? decodeURIComponent(m[1]) : '0'); }
        function sendTo(cmd, data, cb) {
            var inst = getInstance();
            if (window.parent && window.parent.sendTo) { window.parent.sendTo(inst, cmd, data, cb); }
            else { var s = document.createElement('script'); s.src = location.origin + '/socket.io/socket.io.js'; s.onload = function() { var sock = io.connect(location.origin); sock.on('connect', function() { sock.emit('sendTo', inst, cmd, data, cb); }); }; s.onerror = function() { cb(null); }; document.head.appendChild(s); }
        }
        function renderTable(catalog) {
            var search = document.getElementById('search').value.toLowerCase();
            var rows = '', count = 0;
            var topics = Object.keys(catalog).sort();
            for (var i = 0; i < topics.length; i++) {
                var topic = topics[i];
                if (search && topic.toLowerCase().indexOf(search) < 0) continue;
                count++;
                var entry = catalog[topic];
                var val = entry.value !== null && entry.value !== undefined ? String(entry.value).substring(0, 80) : '<span class="null-val">null</span>';
                var inWl = whitelistTopics.has(topic) ? '<span class="badge badge-yes">✓</span>' : '';
                rows += '<tr><td><code>' + topic + '</code></td><td>' + val + '</td><td>' + inWl + '</td></tr>';
            }
            document.getElementById('tbody').innerHTML = rows || '<tr><td colspan="3" class="empty">Keine Topics</td></tr>';
            document.getElementById('count').textContent = count + ' Topics';
        }
        function filterTable() { if (catalogData) renderTable(catalogData); }
        function downloadCatalog() {
            if (!catalogData) return;
            var a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(catalogData, null, 2)], {type:'application/json'})); a.download = 'victron-gx-catalog.json'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
            document.getElementById('status').textContent = '✅ Download gestartet';
        }
        window.addEventListener('load', function() {
            sendTo('downloadMap', {}, function(mapResult) {
                if (mapResult && mapResult.result) {
                    try { var map = JSON.parse(mapResult.result); for (var key in map) { var type = key.split('/')[0], inst2 = key.split('/')[1]; for (var p in map[key].paths) { whitelistTopics.add(type + '/' + inst2 + '/' + p.replace(/\./g, '/')); } } } catch(e) {}
                }
                sendTo('downloadCatalog', {}, function(result) {
                    if (result && result.result) { try { catalogData = JSON.parse(result.result); renderTable(catalogData); } catch(e) { document.getElementById('tbody').innerHTML = '<tr><td colspan="3" class="empty">❌ ' + e.message + '</td></tr>'; } }
                    else { document.getElementById('tbody').innerHTML = '<tr><td colspan="3" class="empty">❌ Adapter nicht erreichbar</td></tr>'; }
                });
            });
        });
    </script>
</body>
</html>
